name: .NET

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [released]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      continue-on-error: true
      env:
        FMP_TESTS_API_KEY: ${{ secrets.FMP_TESTS_API_KEY }}
      run: dotnet test --no-build --verbosity normal
    - name: Build Release (generates .nupkg via GeneratePackageOnBuild)
      run: |
        dotnet build FinancialModelingPrepApi/FinancialModelingPrepApi.csproj \
          --configuration Release \
          --no-restore \
          -p:Version=1.0.0 \
          -p:MinVerSkip=true
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: FinancialModelingPrepApi/bin/Release/*.nupkg
    - name: Publish to GitHub Packages
      if: github.event_name != 'pull_request'
      run: |
        dotnet nuget push FinancialModelingPrepApi/bin/Release/*.nupkg \
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          --api-key ${{ secrets.GITHUB_TOKEN }} \
          --skip-duplicate
